<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pastpaper v0.0.0.alpha</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="top-bar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="tasks.html">Tasks</a>
            <a href="resources.html">Resources</a>
        </div>
        <div class="login-area" id="loginArea">
            <div class="login-button" id="loginButton">Loading...</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="#" id="logoutLink">Logout</a>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Login</h3>
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginSubmit">Login</button>
            <button class="close-modal" id="closeModalBtn">Cancel</button>
        </div>
    </div>

    <div class="container">
        <div class="circle-wrapper">
            <div class="circle-container" id="circleContainer">
                <!-- Circles will be positioned by JavaScript -->
            </div>
            <a href="../index.html" class="back-link">← Back</a>
        </div>
    </div>


    <!-- Animation overlay -->
    <div id="circleOverlay" class="circle-overlay">
        <div id="subjectText" class="subject-text"></div>
    </div>

    <script src="../account.js"></script>
    <script>
        // ====================== Login logic ======================
        const loginButton = document.getElementById('loginButton');
        const dropdownMenu = document.getElementById('dropdownMenu');
        const loginModal = document.getElementById('loginModal');
        const usernameInput = document.getElementById('usernameInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginSubmit = document.getElementById('loginSubmit');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const logoutLink = document.getElementById('logoutLink');

        function updateLoginUI() {
            if (typeof currentUser !== 'undefined' && currentUser) {
                loginButton.textContent = `👤 ${currentUser.username}`;
                dropdownMenu.style.display = 'none';
            } else {
                loginButton.textContent = `🔒 Login`;
                dropdownMenu.style.display = 'none';
            }
        }

        loginButton.addEventListener('click', (e) => {
            e.stopPropagation();
            if (typeof currentUser !== 'undefined' && currentUser) {
                dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
            } else {
                loginModal.style.display = 'flex';
            }
        });

        document.addEventListener('click', (e) => {
            if (!document.getElementById('loginArea').contains(e.target)) {
                dropdownMenu.style.display = 'none';
            }
        });

        loginSubmit.addEventListener('click', () => {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            if (typeof authenticate !== 'undefined') {
                const user = authenticate(username, password);
                if (user) {
                    if (typeof saveCurrentUser !== 'undefined') saveCurrentUser(user);
                    updateLoginUI();
                    loginModal.style.display = 'none';
                    usernameInput.value = '';
                    passwordInput.value = '';
                } else {
                    alert('Invalid username or password');
                }
            } else {
                alert('Authentication not available. Please check account.js.');
            }
        });

        function closeModal() {
            loginModal.style.display = 'none';
        }
        closeModalBtn.addEventListener('click', closeModal);
        window.addEventListener('click', (e) => {
            if (e.target === loginModal) closeModal();
        });

        logoutLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (typeof saveCurrentUser !== 'undefined') saveCurrentUser(null);
            updateLoginUI();
            dropdownMenu.style.display = 'none';
        });

        updateLoginUI();

        // ====================== Circle Navigation ======================
        // Define inner circle subjects (on the inner ring)
        const innerSubjects = [
            { name: "Chinese", url: "./CHINESE" },
            { name: "English", url: "./ENGLISH" },
            { name: "Maths", url: "./MATHS" },
            { name: "CSD", url: "./CSD" }
        ];

        // Define outer circle subjects
        const outerSubjects = [
            { name: "M2", url: "./M2" },
            { name: "Physics", url: "./PHYSICS" },
            { name: "Chemistry", url: "./CHEMISTRY" },
            { name: "Biology", url: "./BIOLOGY" },
            { name: "ICT", url: "./ICT/index.html" }
        ];

        const container = document.getElementById('circleContainer');
        const overlay = document.getElementById('circleOverlay');
        const subjectTextSpan = document.getElementById('subjectText');
        
        let animationInProgress = false;

        // Function to create a circle element
        function createCircle(subject, radiusPercent, angleDeg, extraClass = '') {
            const angleRad = angleDeg * Math.PI / 180;
            const x = 50 + radiusPercent * Math.cos(angleRad);
            const y = 50 + radiusPercent * Math.sin(angleRad);

            const circle = document.createElement('div');
            circle.className = `circle orbit-circle ${extraClass}`;
            circle.style.left = `${x}%`;
            circle.style.top = `${y}%`;
            circle.textContent = subject.name;
            
            // Add click handler with animation
            circle.addEventListener('click', (e) => {
                e.preventDefault();
                animateAndNavigate(subject);
            });
            
            return circle;
        }

        // Animation function
        function animateAndNavigate(subject) {
            if (animationInProgress) return;
            animationInProgress = true;
            
            // Find the clicked circle element
            const clickedCircle = Array.from(document.querySelectorAll('.circle:not(.inner-core)'))
                .find(circle => circle.textContent === subject.name);
            
            if (!clickedCircle) {
                // Fallback: just navigate
                window.location.href = subject.url;
                return;
            }
            
            // Get the circle's position and size
            const rect = clickedCircle.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Create a temporary overlay for the expanding circle
            const tempOverlay = document.createElement('div');
            tempOverlay.style.position = 'fixed';
            tempOverlay.style.top = `${centerY}px`;
            tempOverlay.style.left = `${centerX}px`;
            tempOverlay.style.width = `${rect.width}px`;
            tempOverlay.style.height = `${rect.height}px`;
            tempOverlay.style.borderRadius = '50%';
            tempOverlay.style.backgroundColor = '#2c7da0';
            tempOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
            tempOverlay.style.transformOrigin = 'center center';
            tempOverlay.style.transition = 'all 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
            tempOverlay.style.zIndex = '1000';
            tempOverlay.style.pointerEvents = 'none';
            document.body.appendChild(tempOverlay);
            
            // Shrink the clicked circle
            clickedCircle.classList.add('shrink');
            
            // Expand the overlay to cover the screen
            setTimeout(() => {
                tempOverlay.style.top = '50%';
                tempOverlay.style.left = '50%';
                tempOverlay.style.width = '300vh';
                tempOverlay.style.height = '300vh';
                tempOverlay.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 10);
            
            // Show subject text in the center
            const textOverlay = document.createElement('div');
            textOverlay.textContent = subject.name;
            textOverlay.style.position = 'fixed';
            textOverlay.style.top = '50%';
            textOverlay.style.left = '50%';
            textOverlay.style.transform = 'translate(-50%, -50%)';
            textOverlay.style.color = 'white';
            textOverlay.style.fontSize = '0';
            textOverlay.style.fontWeight = 'bold';
            textOverlay.style.zIndex = '1001';
            textOverlay.style.whiteSpace = 'nowrap';
            textOverlay.style.transition = 'font-size 0.3s ease';
            textOverlay.style.pointerEvents = 'none';
            document.body.appendChild(textOverlay);
            
            // Animate text size
            setTimeout(() => {
                textOverlay.style.fontSize = '4rem';
            }, 300);
            
            // After expansion, shrink to a small circle and navigate
            setTimeout(() => {
                // Create small shrinking circle effect
                const shrinkCircle = document.createElement('div');
                shrinkCircle.style.position = 'fixed';
                shrinkCircle.style.top = '50%';
                shrinkCircle.style.left = '50%';
                shrinkCircle.style.width = '200px';
                shrinkCircle.style.height = '200px';
                shrinkCircle.style.borderRadius = '50%';
                shrinkCircle.style.backgroundColor = '#2c7da0';
                shrinkCircle.style.transform = 'translate(-50%, -50%) scale(1)';
                shrinkCircle.style.transition = 'all 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                shrinkCircle.style.zIndex = '1002';
                shrinkCircle.style.pointerEvents = 'none';
                document.body.appendChild(shrinkCircle);
                
                // Shrink the small circle
                setTimeout(() => {
                    shrinkCircle.style.transform = 'translate(-50%, -50%) scale(0)';
                }, 10);
                
                // Remove overlays and navigate
                setTimeout(() => {
                    tempOverlay.remove();
                    textOverlay.remove();
                    shrinkCircle.remove();
                    
                    // Navigate to the target page
                    window.location.href = subject.url;
                }, 300);
            }, 800);
        }

        // Create inner core (center circle)
        const core = document.createElement('div');
        core.className = 'circle inner-core';
        core.textContent = '★\nCore';
        core.style.left = '50%';
        core.style.top = '50%';
        core.style.cursor = 'default';
        container.appendChild(core);

        // Position inner ring circles (radius = 38%)
        const innerRadius = 16;
        const angleStepInner = 360 / innerSubjects.length;
        innerSubjects.forEach((subject, idx) => {
            const angle = idx * angleStepInner;
            const circle = createCircle(subject, innerRadius, angle, 'inner-orbit');
            container.appendChild(circle);
        });

        // Position outer ring circles (radius = 70%)
        const outerRadius = 34;
        const angleStepOuter = 360 / outerSubjects.length;
        outerSubjects.forEach((subject, idx) => {
            const angle = idx * angleStepOuter;
            const circle = createCircle(subject, outerRadius, angle, 'outer-orbit');
            container.appendChild(circle);
        });
    </script>
</body>
</html>
