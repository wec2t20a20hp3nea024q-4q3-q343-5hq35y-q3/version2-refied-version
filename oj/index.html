<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DSE Online Judge</title>
    <link rel="stylesheet" href="styles.css">
    <!-- KaTeX CSS and JS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="top-bar">
        <div class="nav-links">
            <a href="../index.html">Home</a>
            <a href="../tasks.html">Tasks</a>
            <a href="../resources.html">Resources</a>
        </div>
        <div class="login-area" id="loginArea">
            <div class="login-button" id="loginButton">Loading...</div>
            <div class="dropdown-menu" id="dropdownMenu">
                <a href="#" id="logoutLink">Logout</a>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h3>Login</h3>
            <input type="text" id="usernameInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <button id="loginSubmit">Login</button>
            <button class="close-modal" id="closeModalBtn">Cancel</button>
        </div>
    </div>


    <div class="container">
        <div class="quiz-header">
            <h1>DSE Online Judge</h1>
            <p>Hello World</p>
        </div>
        <div class="filter-bar">
            <div class="filter-group">
                <label>Subject</label>
                <select id="subjectFilter">
                    <option value="all">All Subjects</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Topic</label>
                <select id="topicFilter" disabled>
                    <option value="all">All Topics</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Subtopic</label>
                <select id="subtopicFilter" disabled>
                    <option value="all">All Subtopics</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Question Type</label>
                <select id="typeFilter" disabled>
                    <option value="all">All Types</option>
                    <option value="MC">MC</option>
                    <option value="LQ">LQ</option>
                </select>
            </div>
            <div class="filter-group" style="flex: 2; min-width: 200px;">
                <label>Search</label>
                <input type="text" id="searchInput" placeholder="Search in questions and options..." style="width: 100%;">
            </div>
        </div>

        <div class="stats-bar">
            <div class="score-area">Score: <span id="totalScoreDisplay">0</span> / <span id="maxScoreDisplay">0</span></div>
            <div class="question-count-area">Questions: <span id="questionCountDisplay">0</span> / <span id="totalQuestionCountDisplay">0</span></div>
            <div class="toggle-container">
                <label class="toggle-switch">
                    <input type="checkbox" id="toggleExplanation">
                    <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">Show Explanations</span>
            </div>
            <div class="btn-group">
                <button class="btn-submit" id="submitAllBtn">Submit All</button>
                <button class="btn-reset" id="resetBtn">Reset All</button>
            </div>
        </div>

        <div id="questionsContainer" class="questions-area">
            <div style="text-align: center; padding: 2rem;">Select filters to load questions...</div>
        </div>
        <div id="loadMoreContainer" style="text-align: center; margin-top: 20px;"></div>
    </div>
    <button id="backToTopBtn" class="back-to-top" title="Back to Top">↑</button>
    <footer>
    </footer>

    <script src="../account.js"></script>
    <script src="./database.js"></script>
    <script src="script.js"></script>
    <script>
        // ======================== DATABASE ========================
        
        // Helper: get unique values for a given key
        function getUniqueValues(array, key) {
            const values = array.map(item => item[key]).filter(v => v);
            return [...new Set(values)].sort();
        }

        updateLoginUI();
    </script>
</body>
</html>
